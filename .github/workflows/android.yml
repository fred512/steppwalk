name: Build Android APK

# Builda o APK de debug na nuvem (sem precisar de Android SDK local).
# O APK fica disponível como "artifact" para baixar e instalar no celular.

on:
  push:
    branches: [main]
  workflow_dispatch: # permite rodar manualmente pela aba Actions

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Install Capacitor dependencies
        run: npm install --no-audit --no-fund
        working-directory: src-capacitor

      - name: Build web (Quasar capacitor, UI only)
        run: npx quasar build -m capacitor -T android --skip-pkg

      - name: Sync web assets + plugins into Android project
        run: npx cap sync android
        working-directory: src-capacitor

      - name: Build debug APK
        working-directory: src-capacitor/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stepwalk-debug-apk
          path: src-capacitor/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
